<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Skin Pose Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            margin-bottom: 10px;
        }
        #container {
            width: 400px;
            height: 500px;
            margin: 20px auto;
            background: #1e293b;
            border-radius: 10px;
        }
        input, button {
            margin: 10px;
            padding: 10px 15px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
        }
        input {
            background: white;
        }
        button {
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #2563eb;
        }
        button:disabled {
            background: gray;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>Minecraft Skin Pose Generator</h1>
    <p>Upload a Minecraft skin and download the posed character.</p>

    <input type="file" id="upload" accept="image/png">
    <br>
    <button id="downloadBtn" disabled>Download Posed Character</button>

    <div id="container"></div>

    <script type="module">
        import * as THREE from "https://unpkg.com/three@0.158.0/build/three.module.js";

        let scene, camera, renderer, model;
        let downloadBtn = document.getElementById("downloadBtn");

        init();

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(
                45,
                400 / 500,
                0.1,
                1000
            );
            camera.position.set(6, 7, 10);
            camera.lookAt(0, 3, 0);

            renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true,
                preserveDrawingBuffer: true
            });
            renderer.setSize(400, 500);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0);

            document.getElementById("container").appendChild(renderer.domElement);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);

            const directional = new THREE.DirectionalLight(0xffffff, 1);
            directional.position.set(5, 10, 5);
            scene.add(directional);

            animate();
        }

        function createCharacter(texture) {
            if (model) {
                scene.remove(model);
            }

            texture.magFilter = THREE.NearestFilter;
            texture.minFilter = THREE.NearestFilter;
            texture.colorSpace = THREE.SRGBColorSpace;

            model = new THREE.Group();

            function createLimb(w, h, d, x, y, z, faceUVs) {
                const geometry = new THREE.BoxGeometry(w, h, d);
                const uvAttribute = geometry.attributes.uv;
                
                // faceUVs format: [front, back, top, bottom, right, left] each as [x, y, w, h]
                const faces = [
                    faceUVs[0], // front
                    faceUVs[1], // back
                    faceUVs[2], // top
                    faceUVs[3], // bottom
                    faceUVs[4], // right
                    faceUVs[5]  // left
                ];
                
                // Each face has 4 vertices, and we have 6 faces = 24 vertices
                // Each vertex has 2 UV coordinates
                for (let faceIdx = 0; faceIdx < 6; faceIdx++) {
                    const [uvX, uvY, uvW, uvH] = faces[faceIdx];
                    const x0 = uvX / 64;
                    const y0 = uvY / 64;
                    const x1 = (uvX + uvW) / 64;
                    const y1 = (uvY + uvH) / 64;
                    
                    const vertexStart = faceIdx * 4;
                    
                    // Set UVs for each vertex of this face
                    uvAttribute.setXY(vertexStart, x0, y1);
                    uvAttribute.setXY(vertexStart + 1, x1, y1);
                    uvAttribute.setXY(vertexStart + 2, x0, y0);
                    uvAttribute.setXY(vertexStart + 3, x1, y0);
                }
                uvAttribute.needsUpdate = true;
                
                const material = new THREE.MeshLambertMaterial({
                    map: texture,
                    transparent: true
                });
                
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(x, y, z);
                return mesh;
            }

            // Body parts with UV mapping for Minecraft skin (64x64)
            // Format: [front, back, top, bottom, right, left] each as [x, y, width, height]
            const head = createLimb(2, 2, 2, 0, 6, 0, [
                [8, 8, 8, 8],       // front
                [24, 8, 8, 8],      // back
                [8, 0, 8, 8],       // top
                [16, 0, 8, 8],      // bottom
                [0, 8, 8, 8],       // right
                [16, 8, 8, 8]       // left
            ]);
            
            const body = createLimb(2, 3, 1, 0, 3.5, 0, [
                [20, 20, 8, 12],    // front
                [32, 20, 8, 12],    // back
                [20, 16, 8, 4],     // top
                [28, 16, 8, 4],     // bottom
                [16, 20, 4, 12],    // right
                [28, 20, 4, 12]     // left
            ]);
            
            const rightArm = createLimb(1, 3, 1, -1.5, 3.5, 0, [
                [44, 20, 4, 12],    // front
                [52, 20, 4, 12],    // back
                [44, 16, 4, 4],     // top
                [48, 16, 4, 4],     // bottom
                [40, 20, 4, 12],    // right
                [48, 20, 4, 12]     // left
            ]);
            
            const leftArm = createLimb(1, 3, 1, 1.5, 3.5, 0, [
                [36, 52, 4, 12],    // front
                [44, 52, 4, 12],    // back
                [36, 48, 4, 4],     // top
                [40, 48, 4, 4],     // bottom
                [32, 52, 4, 12],    // right
                [40, 52, 4, 12]     // left
            ]);
            
            const rightLeg = createLimb(1, 3, 1, -0.5, 0.5, 0, [
                [4, 20, 4, 12],     // front
                [12, 20, 4, 12],    // back
                [4, 16, 4, 4],      // top
                [8, 16, 4, 4],      // bottom
                [0, 20, 4, 12],     // right
                [8, 20, 4, 12]      // left
            ]);
            
            const leftLeg = createLimb(1, 3, 1, 0.5, 0.5, 0, [
                [20, 52, 4, 12],    // front
                [28, 52, 4, 12],    // back
                [20, 48, 4, 4],     // top
                [24, 48, 4, 4],     // bottom
                [16, 52, 4, 12],    // right
                [24, 52, 4, 12]     // left
            ]);

            // Apply pose similar to the reference image
            head.rotation.y = THREE.MathUtils.degToRad(20);
            head.rotation.x = THREE.MathUtils.degToRad(-10);

            rightArm.rotation.z = THREE.MathUtils.degToRad(15);
            rightArm.rotation.x = THREE.MathUtils.degToRad(-25);

            leftArm.rotation.z = THREE.MathUtils.degToRad(-25);
            leftArm.rotation.x = THREE.MathUtils.degToRad(10);

            rightLeg.rotation.x = THREE.MathUtils.degToRad(-10);
            leftLeg.rotation.x = THREE.MathUtils.degToRad(10);

            model.add(head, body, rightArm, leftArm, rightLeg, leftLeg);

            // Rotate whole model
            model.rotation.y = THREE.MathUtils.degToRad(-30);

            scene.add(model);
            downloadBtn.disabled = false;
        }

        // Upload skin
        document.getElementById("upload").addEventListener("change", (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const loader = new THREE.TextureLoader();
                loader.load(e.target.result, (texture) => {
                    createCharacter(texture);
                });
            };
            reader.readAsDataURL(file);
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        // Download image
        downloadBtn.addEventListener("click", () => {
            if (!renderer) {
                alert("Please upload a skin first.");
                return;
            }

            renderer.render(scene, camera);
            const link = document.createElement("a");
            link.download = "posed_minecraft_skin.png";
            link.href = renderer.domElement.toDataURL("image/png");
            link.click();
        });
    </script>

</body>
</html>
